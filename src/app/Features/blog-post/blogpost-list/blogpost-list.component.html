<div class="container">
    <h1 class="mt-3">BlogPosts</h1>
    <div class="d-flex justify-content-between mt-3">
        <div class="d-flex">
            <input type="searchText" class="form-control" placeholder="Search blog posts..." #searchInput
                (keyup.enter)="SearchBlogPosts(searchInput.value)">
            <button class="btn btn-primary ms-2" (click)="SearchBlogPosts(searchInput.value)">Search</button>
        </div>
        <a [routerLink]="['/admin/blogposts/add']" class="btn btn-primary" style="margin-right: 50px;"> Add BlogPost</a>
    </div>
</div>
<ng-container *ngIf="$blogposts | async as data">
    <div class="d-flex justify-content-center ">
        <div class="table-responsive " style="width: 100%; max-width: 1291px; padding-right: 47px;">
            <table class="table table-bordered table-striped mt-3">
                <thead>
                    <tr>
                        <th>
                            Title
                            <span class="sort-arrows">
                                <span class="sort-arrow" [class.active]="sortBy === 'Title' && sortDirection === 'asc'"
                                    (click)="SortBlogPosts('Title', 'asc')" title="Sort Ascending">▲</span>
                                <span class="sort-arrow" [class.active]="sortBy === 'Title' && sortDirection === 'desc'"
                                    (click)="SortBlogPosts('Title', 'desc')" title="Sort Descending">▼</span>
                            </span>
                        </th>
                        <th>
                            Short Description
                            <span class="sort-arrows">
                                <span class="sort-arrow"
                                    [class.active]="sortBy === 'ShortDescription' && sortDirection === 'asc'"
                                    (click)="SortBlogPosts('ShortDescription', 'asc')" title="Sort Ascending">▲</span>
                                <span class="sort-arrow"
                                    [class.active]="sortBy === 'ShortDescription' && sortDirection === 'desc'"
                                    (click)="SortBlogPosts('ShortDescription', 'desc')" title="Sort Descending">▼</span>
                            </span>
                        </th>
                        <th style="width: 100px;">Is Visible</th>
                        <th style="width: 150px;">Category</th>
                        <th style="width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let blogpost of data">
                        <td>{{blogpost.title}}</td>
                        <td>{{blogpost.shortDescription}}</td>
                        <td>{{blogpost.isVisible}}</td>
                        <td cclass="text-nowrap">
                            <div class="d-flex flex-wrap">
                            <span *ngFor="let Category of blogpost.categories">
                                <span class="badge bg-primary me-2">{{Category.name}}</span>
                            </span>
                            </div>
                        </td>
                        <td class="text-nowrap">
                            <a [routerLink]="['/admin/blogposts', blogpost.id]" class="btn btn-sm btn-info">Edit</a>
                            <a (click)="deleteBlogPost(blogpost.id)" class="btn btn-sm btn-danger ms-1">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination">
                <nav aria-label="Page navigation example">
                    <ul class="pagination">
                        <li class="page-item" style="cursor: pointer;" [class.disabled]="currentPage === 1"><a
                                class="page-link" (click)="PreviousPage()">Previous</a></li>
                        <li class="page-item" style="cursor: pointer;" *ngFor="let page of getPages()"
                            [class.active]="currentPage === page">
                            <a class="page-link" (click)="GoToPage(page)">{{page}}</a>
                        </li>
                        <li class="page-item" style="cursor: pointer;" [class.disabled]="currentPage === totalPages"><a
                                class="page-link" (click)="NextPage()">Next</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</ng-container>

<!-- Delete Confirmation Modal -->
<ng-template #deleteConfirmModal let-modal>
    <div class="modal-header">
        <h4 class="modal-title">Delete Blog Post</h4>
        <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
        <p>Do you want to delete this Blog Post?</p>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">No</button>
        <button type="button" class="btn btn-danger" (click)="modal.close('yes')">Yes</button>
    </div>
</ng-template>
