<div class="container">
  <div class="my-5">
    <div class="row align-items-stretch">
        <ng-container *ngIf="blogposts$ | async as blogs">
            <div class="col-12 mb-3 col-md-4" *ngFor="let blog of blogs">
                <div class="card h-100">
                    <img [src]="blog.featuredImageURL" class="card-img-top" alt="{{blog.title}}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{blog.title}}</h5>
                        <p class="card-text">{{blog.shortDescription}}</p>
                        <span class="d-flex align-items-end" style="flex: 1">
                            <a [routerLink]="['/blog', blog.urlHandle]" class="btn btn-primary mt-auto">Read More</a>
                        </span>
                    </div>
                </div>
            </div>
        </ng-container>
    </div>
  </div>
</div>
