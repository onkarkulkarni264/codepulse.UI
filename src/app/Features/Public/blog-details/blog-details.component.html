<ng-container *ngIf="blogpost$ | async as blogpost;else loader">
    <div class="container">
        <div class="py-5">
            <div class="col-12 col-md-8 col-lg-6 mx-auto">
                <img [src]="blogpost.featuredImageURL" class="img-fluid" alt="{{blogpost.title}}">
                <h1 class="my-4">{{blogpost.title}}</h1>
                <div class="d-flex justify-content-between mt-4">
                    <span>{{blogpost.auther}}</span>
                    <span>{{blogpost.publishedDate | date:'dd MMM yyyy'}}</span>
                </div>
                <div *ngIf="blogpost.categories" class="mt-4">
                    <span *ngFor="let category of blogpost.categories" class="badge bg-secondary me-2">{{category.name}}</span>
                </div>
                <div class="mt-4 blog-content">
                    <markdown [data]="blogpost.content"></markdown>
                </div>
            </div>
        </div>
    </div>
</ng-container>
<ng-template #loader>
    <div class="d-flex justify-content-center align-items-center" style="height: 200px;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</ng-template>
