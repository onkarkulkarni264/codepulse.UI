<div class="container">
    <h1 class="mt-3">Edit Category</h1>
    <ng-container *ngIf="category;else notFound">
        <form  #form="ngForm" (ngSubmit)="onFormSubmit()" >
            <div class="mt-2">
                <div class="mt-3" style="display: none;">
                    <label for="categoryID" class="form-label">Category ID</label>
                    <input type="text" name="categoryID" id="categoryID" class="form-control" [(ngModel)]="category.id" disabled>
                </div>
                <div class="mt-3">
                    <label for="categoryName" class="form-label">Category Name</label>
                    <input type="text" name="categoryName"  id="categoryName" class="form-control" [(ngModel)]="category.name" >
                </div>
                <div class="mt-3">
                    <label for="categoryURLHandle" class="form-label">Category URL Handle</label>
                    <input type="text" name="categoryURLHandle" id="categoryURLHandle" class="form-control" [(ngModel)]="category.urlHandle" >
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary btn-sm" > Save</button>
                    <button type="button" class="btn btn-danger btn-sm ms-3" (click)="OnDelete()">Delete</button>
                </div>
            </div>
        </form>
    </ng-container>
    <ng-template #notFound>
        <div class="alert alert-warning mt-3" role="alert">
            Category not found
        </div>
    </ng-template>
    
</div>
