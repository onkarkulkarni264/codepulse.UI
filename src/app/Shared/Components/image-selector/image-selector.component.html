<div class="card h-100">
    <div class="header card-header position-relative">
        <h3 class="card-title">Image Selector</h3>
        <button type="button" class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close" (click)="close.emit()"></button>
    </div>
    <div class="card-body">
     <div class="d-flex flex-md-row flex-sm-column flex-wrap">
        <div class="col-8 p-4" style="overflow-y: scroll;">
            <ng-container *ngIf="images$ | async as images">
                <div class="d-flex flex-wrap">
                    <div *ngFor="let image of images"
                    style="min-width: 100; justify-content: center; cursor: pointer;"
                    class="me-1 bg-white d-flex align-items-center flex-column p-3 border"
                     (click) = "SelectImage(image)">
                        <img [src]="image.url" [title]="image.title" style="height: 100px;">
                        <span class="text-center">{{image.title}}</span>
                    </div>
                </div>
            </ng-container>
        </div>
        <div class="col-4 p-4 bg-light">
            <h5>Upload Image</h5>
            <form #form="ngForm" (ngSubmit)="uploadImage()">
                <div class="mt-3">
                    <input class="form-control" type="file" id="File" (change)="onFileSelected($event)" >
                </div>
                <div class="mt-3">
                    <input class="form-control" type="text" id="filename" name="filename" placeholder="Enter File Name" [(ngModel)]="filename">
                </div>
                <div class="mt-3">
                    <input class="form-control" type="text" id="title" name="title" placeholder="Enter Title" [(ngModel)]="title">
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-dark">Upload</button>
                </div>
            </form>
        </div>
     </div>
    </div>
</div>
